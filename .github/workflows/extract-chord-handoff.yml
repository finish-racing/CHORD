name: Extract CHORD handoff

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/extract-chord-handoff.yml

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install extraction tools
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full rsync

      - name: Verify archive exists
        run: |
          test -f CHORD_Project_Full_Handoff.7z
          7z l CHORD_Project_Full_Handoff.7z

      - name: Extract CHORD handoff archive
        run: |
          rm -rf _chord_handoff_extract
          mkdir _chord_handoff_extract
          7z x CHORD_Project_Full_Handoff.7z -o_chord_handoff_extract -y
          find _chord_handoff_extract -maxdepth 4 -type f | sort | head -250

      - name: Sync extracted release contents
        shell: bash
        run: |
          set -euo pipefail
          SRC="_chord_handoff_extract"
          shopt -s nullglob dotglob
          entries=("$SRC"/*)
          if [ "${#entries[@]}" -eq 1 ] && [ -d "${entries[0]}" ]; then
            SRC="${entries[0]}"
          fi

          rsync -a "$SRC"/ ./ \
            --exclude '.git/' \
            --exclude '.github/workflows/extract-chord-handoff.yml' \
            --exclude 'CHORD_Project_Full_Handoff.7z' \
            --exclude '__pycache__/' \
            --exclude '.pytest_cache/' \
            --exclude '.mypy_cache/' \
            --exclude '.ruff_cache/' \
            --exclude '.DS_Store'

          rm -rf _chord_handoff_extract

      - name: Remove temporary workflow
        run: |
          git rm .github/workflows/extract-chord-handoff.yml

      - name: Commit extracted CHORD release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No extracted release changes to commit."
          else
            git commit -m "Sync CHORD release from handoff archive"
            git push
          fi
