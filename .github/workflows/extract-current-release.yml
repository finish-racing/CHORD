name: Extract current CHORD release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/extract-current-release.yml

permissions:
  contents: write

jobs:
  extract-current-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install extraction tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip rsync

      - name: Verify current release archive exists
        run: |
          test -f "CHORD Compressed/artifacts/CHORD_UbuntuTestCyclePackage_v1.zip"
          unzip -l "CHORD Compressed/artifacts/CHORD_UbuntuTestCyclePackage_v1.zip" | head -200

      - name: Extract current release archive
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _chord_current_release_extract
          mkdir _chord_current_release_extract
          unzip -q "CHORD Compressed/artifacts/CHORD_UbuntuTestCyclePackage_v1.zip" -d _chord_current_release_extract
          find _chord_current_release_extract -maxdepth 5 -type f | sort | head -300

      - name: Sync current release contents to repository root
        shell: bash
        run: |
          set -euo pipefail
          SRC="_chord_current_release_extract"
          shopt -s nullglob dotglob
          entries=("$SRC"/*)
          if [ "${#entries[@]}" -eq 1 ] && [ -d "${entries[0]}" ]; then
            SRC="${entries[0]}"
          fi

          rsync -a "$SRC"/ ./ \
            --exclude '.git/' \
            --exclude '.github/workflows/extract-current-release.yml' \
            --exclude '__pycache__/' \
            --exclude '.pytest_cache/' \
            --exclude '.mypy_cache/' \
            --exclude '.ruff_cache/' \
            --exclude '.DS_Store'

          rm -rf _chord_current_release_extract

      - name: Remove temporary workflow
        run: |
          git rm .github/workflows/extract-current-release.yml

      - name: Commit current release sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No current release changes to commit."
          else
            git commit -m "Sync current CHORD Ubuntu test release"
            git push
          fi
