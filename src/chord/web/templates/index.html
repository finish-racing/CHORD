{% extends "base.html" %}
{% block content %}
<section class="hero-card">
  <div class="hero-copy">
    <h1>CHORD</h1>
    <p class="tagline">Curation Heuristics for Omission, Redundancy, and Discovery</p>
    <p class="subtext">Advanced playlist intelligence powered by the PRISM Engine.</p>
    <div class="action-row">
      <a class="btn primary" href="/new-run">Start a new analysis</a>
    </div>
  </div>
  <div class="hero-panel">
    <div class="mini-chart">
      <div class="mini-stat"><span class="label">Top 25 anchors</span><span class="value">Required</span></div>
      <div class="mini-stat"><span class="label">Playlist universe</span><span class="value">1 or more</span></div>
      <div class="mini-stat"><span class="label">Output modes</span><span class="value">Add + Curated</span></div>
    </div>
  </div>
</section>
{% endblock %}
